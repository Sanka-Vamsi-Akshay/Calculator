<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
    <script defer src="calculator.js"></script>
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"
    />
</head>
<body id="mode" class="dark">
    <div class="header">
        <h1>Calculator</h1>
        <div id="theme" class="theme"><i class="ri-moon-fill"></i></div>
    </div>
    <div id="container" class="dark-container">
        <div class="screen">0</div>
        <div class="button-container">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="op">+</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="op">-</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="op">*</button>
            <button>0</button>
            <button>00</button>
            <button>.</button>
            <button class="op">/</button>
            <button class="equal">=</button>
            <button class="clear">AC</button>
        </div>
    </div>
</body>
</html>
